# Create a Spring Web Project using Maven

## Exercise

Hands-on 1:

Create a Spring Web Project using Maven.

---

## Project Details

Group ID:

com.cognizant

Artifact ID:

spring-learn

Package:

com.cognizant.springlearn

---

## Dependencies

1. Spring Web
2. Spring Boot DevTools
3. Spring Boot Test

---

## Main Class

SpringLearnApplication.java

The main class contains:

- @SpringBootApplication
- SpringApplication.run()
- LoggerFactory
- LOGGER.info("START")
- LOGGER.info("END")

---

## Folder Details

### src/main/java

Contains the Java application code.

### src/main/resources

Contains application configuration files.

### src/test/java

Contains testing code.

### pom.xml

Contains:

- Project information
- Spring Boot version
- Java version
- Dependencies
- Maven plugins

---

## Build the Project

Open Command Prompt inside the spring-learn folder.

Run:

mvn clean package

---

## Run the Application

Run:

mvn spring-boot:run

---

## Cognizant Proxy Build Command

Use this only when the Cognizant proxy is required:

mvn clean package -Dhttp.proxyHost=proxy.cognizant.com -Dhttp.proxyPort=6050 -Dhttps.proxyHost=proxy.cognizant.com -Dhttps.proxyPort=6050 -Dhttp.proxyUser=123456

Replace:

123456

with your actual required proxy user ID.

---

## Eclipse Import

1. Open Eclipse.
2. Click File.
3. Click Import.
4. Select Maven.
5. Select Existing Maven Projects.
6. Click Browse.
7. Select the spring-learn folder.
8. Click Finish.

---

## Expected Main Logs

The console should show:

START

and after the application starts:

END
